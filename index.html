<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Solar 3D - Three.js</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #0f1f3d 0%, #050814 45%, #02030a 100%);
      color: #eef3ff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .ui {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 20;
      width: min(360px, calc(100vw - 36px));
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(8, 12, 28, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    .ui h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
      line-height: 1.1;
    }

    .ui p {
      margin: 0 0 14px;
      color: #c8d3ff;
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .row {
      display: grid;
      gap: 6px;
    }

    .row label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 0.92rem;
      color: #dce6ff;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #8fb2ff;
      cursor: pointer;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    button {
      border: 0;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(135deg, #dbe7ff, #93b6ff);
      color: #081223;
      box-shadow: 0 8px 24px rgba(80, 130, 255, 0.22);
      transition: transform 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .hint {
      margin-top: 14px;
      font-size: 0.86rem;
      color: #b9c7f7;
      line-height: 1.45;
    }

    .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.9rem;
      color: #d8e2ff;
      line-height: 1.45;
    }

    .status strong {
      color: #ffffff;
    }

    .credits {
      position: absolute;
      right: 16px;
      bottom: 14px;
      z-index: 20;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(7, 10, 24, 0.55);
      border: 1px solid rgba(255,255,255,0.08);
      color: #c8d3ff;
      font-size: 0.82rem;
    }

    .planet-label {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 25;
      min-width: 220px;
      max-width: 280px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(10, 16, 34, 0.9);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      transform: translate(-50%, -115%);
      transform-origin: bottom center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .planet-label.visible {
      opacity: 1;
      transform: translate(-50%, -125%);
    }

    .planet-label h2 {
      margin: 0 0 8px;
      font-size: 1rem;
      line-height: 1.1;
      color: #ffffff;
    }

    .planet-label p {
      margin: 0 0 8px;
      font-size: 0.84rem;
      color: #c8d3ff;
      line-height: 1.35;
    }

    .planet-facts {
      display: grid;
      gap: 6px;
      font-size: 0.82rem;
      color: #e6eeff;
    }

    .planet-facts div {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .planet-facts span:first-child {
      color: #b5c4ef;
    }

    .planet-label::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      width: 14px;
      height: 14px;
      transform: translateX(-50%) rotate(45deg);
      background: rgba(10, 16, 34, 0.92);
      border-right: 1px solid rgba(255,255,255,0.12);
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    @media (max-width: 680px) {
      .ui {
        top: 12px;
        left: 12px;
        padding: 14px;
      }

      .ui h1 {
        font-size: 1.2rem;
      }

      .credits {
        left: 12px;
        right: 12px;
        bottom: 12px;
        text-align: center;
      }

      .planet-label {
        min-width: 200px;
        max-width: 240px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="ui">
      <h1>Sistema Solar 3D</h1>
      <p>
        Haz clic en un planeta para enfocarlo suavemente. Puedes seguir orbitando,
        hacer zoom y desplazar la cámara con los controles del ratón.
      </p>

      <div class="controls">
        <div class="row">
          <label for="speed">
            <span>Velocidad orbital</span>
            <strong id="speedValue">1.0x</strong>
          </label>
          <input id="speed" type="range" min="0" max="3" step="0.05" value="1" />
        </div>

        <div class="buttons">
          <button id="pauseBtn">Pausar</button>
          <button id="resetBtn">Reiniciar cámara</button>
        </div>
      </div>

      <div class="status" id="statusBox">
        <strong>Foco actual:</strong> ninguno.
      </div>

      <div class="hint">
        Ratón izquierdo: orbitar · rueda: zoom · botón derecho: mover · clic en un planeta: enfocar
      </div>
    </div>

    <div class="planet-label" id="planetLabel"></div>
    <div class="credits">Three.js + OrbitControls</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.166.1/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.166.1/examples/jsm/controls/OrbitControls.js";

    const app = document.getElementById("app");
    const speedSlider = document.getElementById("speed");
    const speedValue = document.getElementById("speedValue");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusBox = document.getElementById("statusBox");
    const planetLabel = document.getElementById("planetLabel");

    let paused = false;
    let speedMultiplier = parseFloat(speedSlider.value);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x02030a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      5000
    );
    camera.position.set(0, 120, 260);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    renderer.domElement.addEventListener("contextmenu", (e) => e.preventDefault());

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enableZoom = true;
    controls.enablePan = true;
    controls.minDistance = 12;
    controls.maxDistance = 1200;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.22);
    scene.add(ambientLight);

    const sunLight = new THREE.PointLight(0xffffff, 2.8, 0, 0);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);

    function createStars(count = 5000) {
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);

      for (let i = 0; i < count; i++) {
        const radius = 1200 + Math.random() * 1800;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);

        positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = radius * Math.cos(phi);
        positions[i * 3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
      }

      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

      const material = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 2.2,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.9
      });

      const stars = new THREE.Points(geometry, material);
      scene.add(stars);
    }

    createStars();

    function createOrbit(radius, color = 0x445577) {
      const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, Math.PI * 2, false, 0);
      const points = curve.getPoints(160);
      const orbitGeometry = new THREE.BufferGeometry().setFromPoints(
        points.map((p) => new THREE.Vector3(p.x, 0, p.y))
      );

      const orbitMaterial = new THREE.LineBasicMaterial({
        color,
        transparent: true,
        opacity: 0.45
      });

      const orbit = new THREE.LineLoop(orbitGeometry, orbitMaterial);
      scene.add(orbit);
    }

    function createPlanet({
      name,
      radius,
      distance,
      color,
      speed,
      facts,
      emissive = 0x000000,
      ring = null
    }) {
      const geometry = new THREE.SphereGeometry(radius, 48, 48);
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.9,
        metalness: 0.05,
        emissive,
        emissiveIntensity: emissive !== 0x000000 ? 0.6 : 0
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(distance, 0, 0);
      scene.add(mesh);

      let ringMesh = null;

      if (ring) {
        const ringGeometry = new THREE.RingGeometry(ring.inner, ring.outer, 96);
        const ringMaterial = new THREE.MeshBasicMaterial({
          color: ring.color,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.78
        });

        ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
        ringMesh.rotation.x = Math.PI / 2.35;
        mesh.add(ringMesh);
      }

      createOrbit(distance);

      const planet = {
        name,
        mesh,
        ringMesh,
        radius,
        distance,
        speed,
        angle: Math.random() * Math.PI * 2,
        rotationSpeed: 0.003 + Math.random() * 0.01,
        facts,
        baseEmissive: material.emissive.clone()
      };

      mesh.userData.planet = planet;
      return planet;
    }

    const sunGeometry = new THREE.SphereGeometry(16, 64, 64);
    const sunMaterial = new THREE.MeshBasicMaterial({
      color: 0xffb347
    });
    const sun = new THREE.Mesh(sunGeometry, sunMaterial);
    scene.add(sun);

    const sunGlowGeometry = new THREE.SphereGeometry(20, 64, 64);
    const sunGlowMaterial = new THREE.MeshBasicMaterial({
      color: 0xffa726,
      transparent: true,
      opacity: 0.18
    });
    const sunGlow = new THREE.Mesh(sunGlowGeometry, sunGlowMaterial);
    scene.add(sunGlow);

    const planets = [
      createPlanet({
        name: "Mercurio",
        radius: 2.2,
        distance: 28,
        color: 0xa9a9a9,
        speed: 0.038,
        facts: {
          tipo: "Rocoso",
          diametro: "4.879 km",
          distancia: "0,39 AU",
          año: "88 días",
          día: "58,6 días"
        }
      }),
      createPlanet({
        name: "Venus",
        radius: 3.8,
        distance: 40,
        color: 0xd8b36a,
        speed: 0.028,
        facts: {
          tipo: "Rocoso",
          diametro: "12.104 km",
          distancia: "0,72 AU",
          año: "225 días",
          día: "243 días"
        }
      }),
      createPlanet({
        name: "Tierra",
        radius: 4.2,
        distance: 56,
        color: 0x3f82ff,
        speed: 0.022,
        facts: {
          tipo: "Rocoso",
          diametro: "12.742 km",
          distancia: "1,00 AU",
          año: "365 días",
          día: "24 h"
        }
      }),
      createPlanet({
        name: "Marte",
        radius: 3.1,
        distance: 72,
        color: 0xc65d3a,
        speed: 0.018,
        facts: {
          tipo: "Rocoso",
          diametro: "6.779 km",
          distancia: "1,52 AU",
          año: "687 días",
          día: "24,6 h"
        }
      }),
      createPlanet({
        name: "Júpiter",
        radius: 9.5,
        distance: 102,
        color: 0xcda06b,
        speed: 0.010,
        facts: {
          tipo: "Gigante gaseoso",
          diametro: "139.820 km",
          distancia: "5,20 AU",
          año: "11,86 años",
          día: "9,9 h"
        }
      }),
      createPlanet({
        name: "Saturno",
        radius: 8.2,
        distance: 138,
        color: 0xd8c089,
        speed: 0.0075,
        ring: {
          inner: 11,
          outer: 17,
          color: 0xcbb58a
        },
        facts: {
          tipo: "Gigante gaseoso",
          diametro: "116.460 km",
          distancia: "9,58 AU",
          año: "29,45 años",
          día: "10,7 h"
        }
      }),
      createPlanet({
        name: "Urano",
        radius: 6.2,
        distance: 174,
        color: 0x7fe7ea,
        speed: 0.0055,
        facts: {
          tipo: "Gigante helado",
          diametro: "50.724 km",
          distancia: "19,2 AU",
          año: "84 años",
          día: "17,2 h"
        }
      }),
      createPlanet({
        name: "Neptuno",
        radius: 6.0,
        distance: 208,
        color: 0x426dff,
        speed: 0.0042,
        facts: {
          tipo: "Gigante helado",
          diametro: "49.244 km",
          distancia: "30,05 AU",
          año: "164,8 años",
          día: "16,1 h"
        }
      })
    ];

    const clickableMeshes = planets.map((planet) => planet.mesh);
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const pointerDown = new THREE.Vector2();

    const clock = new THREE.Clock();

    let focusedPlanet = null;
    let desiredFocusDistance = 40;

    const tmpVec = new THREE.Vector3();
    const tmpVec2 = new THREE.Vector3();

    function setSelectedPlanet(planet) {
      focusedPlanet = planet;

      planets.forEach((p) => {
        p.mesh.scale.setScalar(p === planet ? 1.18 : 1);
        if (p === planet) {
          p.mesh.material.emissive.setRGB(0.18, 0.18, 0.18);
        } else {
          p.mesh.material.emissive.copy(p.baseEmissive);
        }
      });

      if (planet) {
        desiredFocusDistance = Math.max(planet.radius * 7.5, 18);

        statusBox.innerHTML = `<strong>Foco actual:</strong> ${planet.name}.`;
        planetLabel.innerHTML = `
          <h2>${planet.name}</h2>
          <p>Datos clave del planeta seleccionado.</p>
          <div class="planet-facts">
            <div><span>Tipo</span><span>${planet.facts.tipo}</span></div>
            <div><span>Diámetro</span><span>${planet.facts.diametro}</span></div>
            <div><span>Distancia al Sol</span><span>${planet.facts.distancia}</span></div>
            <div><span>Duración del año</span><span>${planet.facts.año}</span></div>
            <div><span>Duración del día</span><span>${planet.facts.día}</span></div>
          </div>
        `;
        planetLabel.classList.add("visible");
      } else {
        statusBox.innerHTML = `<strong>Foco actual:</strong> ninguno.`;
        planetLabel.classList.remove("visible");

        planets.forEach((p) => {
          p.mesh.scale.setScalar(1);
          p.mesh.material.emissive.copy(p.baseEmissive);
        });
      }
    }

    function focusPlanetFromClick(planet) {
      setSelectedPlanet(planet);
    }

    function clearPlanetFocus() {
      setSelectedPlanet(null);
    }

    function syncFocusDistanceWithCamera() {
      if (!focusedPlanet) return;
      desiredFocusDistance = THREE.MathUtils.clamp(
        camera.position.distanceTo(controls.target),
        12,
        500
      );
    }

    controls.addEventListener("end", syncFocusDistanceWithCamera);
    renderer.domElement.addEventListener(
      "wheel",
      () => requestAnimationFrame(syncFocusDistanceWithCamera),
      { passive: true }
    );

    renderer.domElement.addEventListener("pointerdown", (event) => {
      pointerDown.set(event.clientX, event.clientY);
    });

    renderer.domElement.addEventListener("pointerup", (event) => {
      const moved = Math.hypot(
        event.clientX - pointerDown.x,
        event.clientY - pointerDown.y
      );

      if (moved > 5) return;

      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickableMeshes, false);

      if (hits.length > 0) {
        const planet = hits[0].object.userData.planet;
        focusPlanetFromClick(planet);
      } else {
        clearPlanetFocus();
      }
    });

    speedSlider.addEventListener("input", () => {
      speedMultiplier = parseFloat(speedSlider.value);
      speedValue.textContent = `${speedMultiplier.toFixed(1)}x`;
    });

    pauseBtn.addEventListener("click", () => {
      paused = !paused;
      pauseBtn.textContent = paused ? "Reanudar" : "Pausar";
    });

    resetBtn.addEventListener("click", () => {
      clearPlanetFocus();
      camera.position.set(0, 120, 260);
      controls.target.set(0, 0, 0);
      controls.update();
    });

    function updateFocusedCamera() {
      if (!focusedPlanet) return;

      const planetPos = focusedPlanet.mesh.position.clone();

      const currentViewDir = camera.position.clone().sub(controls.target);
      if (currentViewDir.lengthSq() < 0.0001) {
        currentViewDir.set(1, 0.35, 1);
      }

      currentViewDir.normalize();

      const desiredCameraPos = planetPos
        .clone()
        .add(currentViewDir.multiplyScalar(desiredFocusDistance))
        .add(new THREE.Vector3(0, focusedPlanet.radius * 0.35, 0));

      controls.target.lerp(planetPos, 0.09);
      camera.position.lerp(desiredCameraPos, 0.075);
    }

    function updatePlanetLabel() {
      if (!focusedPlanet) return;

      tmpVec.copy(focusedPlanet.mesh.position);
      tmpVec.y += focusedPlanet.radius + 6;

      tmpVec.project(camera);

      const x = (tmpVec.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-tmpVec.y * 0.5 + 0.5) * window.innerHeight;

      const isBehindCamera = tmpVec.z > 1 || tmpVec.z < -1;

      if (isBehindCamera) {
        planetLabel.style.opacity = "0";
        return;
      }

      planetLabel.style.opacity = "1";
      planetLabel.style.left = `${x}px`;
      planetLabel.style.top = `${y}px`;
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (!paused) {
        sun.rotation.y += 0.003;
        sunGlow.rotation.y -= 0.0015;

        planets.forEach((planet) => {
          planet.angle += planet.speed * speedMultiplier * Math.max(delta * 60, 0.2);
          planet.mesh.position.x = Math.cos(planet.angle) * planet.distance;
          planet.mesh.position.z = Math.sin(planet.angle) * planet.distance;
          planet.mesh.rotation.y += planet.rotationSpeed + delta * 0.3;
        });
      }

      updateFocusedCamera();
      controls.update();
      updatePlanetLabel();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      updatePlanetLabel();
    });
  </script>
</body>
</html>
